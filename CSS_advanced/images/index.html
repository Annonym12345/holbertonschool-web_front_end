<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS Advanced</title>
  <link rel="stylesheet" href="styles.css">

  <!-- Favicon -->
  <link rel="icon" href="images/favicon.ico">
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <img src="images/logo-header.png" alt="Logo" class="logo">
  </header>

  <!-- HERO / ABOUT -->
  <section class="hero">
    <div class="overlay">
      <h1>Welcome</h1>
      <p>We build amazing experiences</p>
    </div>
  </section>

  <!-- WORK -->
  <section class="section">
    <h2>Our Work</h2>

    <div class="grid">
      <div class="card" style="background-image: url('images/pic-work-01.jpg');"></div>
      <div class="card" style="background-image: url('images/pic-work-02.jpg');"></div>
      <div class="card" style="background-image: url('images/pic-work-03.jpg');"></div>
    </div>
  </section>

  <!-- ARTICLES -->
  <section class="section dark">
    <h2>Articles</h2>

    <div class="grid">
      <div class="card" style="background-image: url('images/pic-article-01.jpg');"></div>
      <div class="card" style="background-image: url('images/pic-article-02.jpg');"></div>
      <div class="card" style="background-image: url('images/pic-article-03.jpg');"></div>
    </div>
  </section>

  <!-- TEAM -->
  <section class="section">
    <h2>Our Team</h2>

    <div class="team">
      <img src="images/pic-person-01.jpg" alt="">
      <img src="images/pic-person-02.jpg" alt="">
      <img src="images/pic-person-03.jpg" alt="">
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <img src="images/logo-footer.png" alt="Logo">
  </footer>

</body>
</html>
